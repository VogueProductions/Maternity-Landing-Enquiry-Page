<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maternity Funnel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="container">

  <h1>Find Your <span>Perfect</span> Package</h1>
  <p class="subtitle">Answer a few questions & get your ideal shoot plan 💕</p>

  <!-- STEP 1 -->
  <div class="step active" id="step-1">
    <h2>What’s your name?</h2>
    <input type="text" id="name" placeholder="Enter your name">
    <button onclick="handleStep1()">Next →</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step-2">
    <h2>Select your shoot type</h2>
    <select id="shootType">
      <option value="">Select</option>
      <option value="basic">Budget</option>
      <option value="premium">Premium</option>
      <option value="luxury">Luxury</option>
    </select>
    <button onclick="handleStep2()">Next →</button>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step-3">
    <h2>Your budget?</h2>
    <select id="budget">
      <option value="">Select</option>
      <option value="low">Under ₹8K</option>
      <option value="mid">₹8K–₹15K</option>
      <option value="high">₹15K+</option>
    </select>
    <button onclick="handleStep3()">Next →</button>
  </div>

  <!-- STEP 4 -->
  <div class="step" id="step-4">
    <h2>What matters most?</h2>
    <select id="priority">
      <option value="">Select</option>
      <option value="price">Affordable</option>
      <option value="quality">Quality</option>
      <option value="experience">Experience</option>
    </select>
    <button onclick="showRecommendation()">See My Package</button>
  </div>

  <!-- RESULT -->
  <div class="step" id="step-5">
    <div id="result"></div>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
